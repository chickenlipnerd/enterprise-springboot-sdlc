apiVersion: apps/v1
kind: Deployment
metadata:
  name: SERVICE_NAME
  labels:
    app.kubernetes.io/name: SERVICE_NAME
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: SERVICE_NAME
  template:
    metadata:
      labels:
        app.kubernetes.io/name: SERVICE_NAME
    spec:
      containers:
        - name: SERVICE_NAME
          image: image-registry.openshift-image-registry.svc:5000/enterprise-sdlc/SERVICE_NAME:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: dev
            - name: USER_SERVICE_DB_URL
              valueFrom:
                secretKeyRef:
                  name: enterprise-database
                  key: jdbc-url
