name: publish-artifacts

on:
  workflow_dispatch:
    inputs:
      registry-target:
        description: Artifact registry target
        required: true
        default: nexus
        type: choice
        options:
          - nexus
          - github-packages
      skip-tests:
        description: Skip tests during publish
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NEXUS_RELEASE_URL: ${{ secrets.NEXUS_RELEASE_URL }}
      NEXUS_SNAPSHOT_URL: ${{ secrets.NEXUS_SNAPSHOT_URL }}
      GITHUB_PACKAGES_URL: https://maven.pkg.github.com/${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: ${{ inputs.registry-target == 'nexus' && 'nexus-releases' || 'github' }}
          server-username: MAVEN_REPOSITORY_USERNAME
          server-password: MAVEN_REPOSITORY_PASSWORD

      - name: Publish to Nexus (primary)
        if: ${{ inputs.registry-target == 'nexus' }}
        env:
          MAVEN_REPOSITORY_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          MAVEN_REPOSITORY_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
        run: ./mvnw -B -ntp -Ppublish-nexus -DskipTests=${{ inputs['skip-tests'] }} deploy

      - name: Publish to GitHub Packages (alternative)
        if: ${{ inputs.registry-target == 'github-packages' }}
        env:
          MAVEN_REPOSITORY_USERNAME: ${{ github.actor }}
          MAVEN_REPOSITORY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: ./mvnw -B -ntp -Ppublish-github-packages -DskipTests=${{ inputs['skip-tests'] }} deploy
