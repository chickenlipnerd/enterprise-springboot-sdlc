name: monorepo-ci

on:
  push:
    branches:
      - main
      - ai-conversation
      - 'copilot/**'
  pull_request:
    branches:
      - main
      - ai-conversation

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Validate Maven wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build monorepo
        run: ./mvnw -B -ntp verify
