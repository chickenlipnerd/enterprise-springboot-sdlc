spring:
  application:
    name: catalog-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${CATALOG_SERVICE_DB_URL:jdbc:postgresql://localhost:5432/catalog_service}
    username: ${CATALOG_SERVICE_DB_USERNAME:catalog_service}
    password: ${CATALOG_SERVICE_DB_PASSWORD:catalog_service}
    hikari:
      initialization-fail-timeout: -1
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        boot.allow_jdbc_metadata_access: false
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
server:
  port: 8082
